<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="100%" height="100%">
    <defs>
        <style>
            .box { fill: #ffffff; stroke: #333333; stroke-width: 1.5; rx: 6; ry: 6; }
            .box-council { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; rx: 8; ry: 8; }
            .box-agent { fill: #fff3e0; stroke: #e65100; stroke-width: 1.5; rx: 8; ry: 8; }
            .box-db { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; rx: 6; ry: 6; }
            .box-tool { fill: #f3e5f5; stroke: #7b1fa2; stroke-width: 1.5; rx: 6; ry: 6; }
            .box-triage { fill: #fff8e1; stroke: #f9a825; stroke-width: 1.5; rx: 6; ry: 6; }
            .text-main { font-family: "Times New Roman", Times, serif; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; fill: #111; }
            .text-sub { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: #333; }
            .text-sm { font-family: Arial, sans-serif; font-size: 10px; font-style: italic; text-anchor: middle; dominant-baseline: central; fill: #555; }
            .line { stroke: #555; stroke-width: 1.5; fill: none; }
            .line-dash { stroke: #555; stroke-width: 1.5; fill: none; stroke-dasharray: 4,4; }
        </style>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#555" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="white"/>
    <rect x="40" y="100" width="340" height="130" class="box-council" />
<text x="210" y="115" class="text-main">Council Engine</text>
<rect x="460" y="100" width="340" height="130" class="box-agent" />
<text x="630" y="115" class="text-main">Agent Engine</text>
<rect x="320" y="20" width="200" height="40" class="box" />
<text x="420" y="40" class="text-main">Client (React 19 + SSE)</text>
<rect x="60" y="140" width="80" height="30" class="box" />
<text x="100" y="155" class="text-sub">Seed Triage</text>
<rect x="170" y="140" width="120" height="30" class="box" />
<text x="230" y="155" class="text-sub">Parallel Experts (×3)</text>
<rect x="200" y="190" width="100" height="30" class="box" />
<text x="250" y="205" class="text-sub">Seed Synthesis</text>
<path d="M 140,155 L 170,155" class="line" marker-end="url(#arrow)" />
<path d="M 230,170 L 250,190" class="line" marker-end="url(#arrow)" />
<rect x="480" y="140" width="60" height="30" class="box" />
<text x="510" y="155" class="text-sub">Planner</text>
<rect x="560" y="140" width="80" height="30" class="box" />
<text x="600" y="155" class="text-sub">Att. Reader</text>
<rect x="660" y="140" width="120" height="30" class="box" />
<text x="720" y="155" class="text-sub">Tool Loop (ReAct)</text>
<rect x="670" y="190" width="100" height="30" class="box" />
<text x="720" y="205" class="text-sub">Answer Writer</text>
<path d="M 540,155 L 560,155" class="line" marker-end="url(#arrow)" />
<path d="M 640,155 L 660,155" class="line" marker-end="url(#arrow)" />
<path d="M 720,170 L 720,190" class="line" marker-end="url(#arrow)" />
<rect x="370" y="270" width="100" height="40" class="box-db" />
<text x="420" y="290" class="text-main" fill="#2e7d32">MongoDB</text>
<rect x="520" y="270" width="100" height="40" class="box-tool" />
<text x="570" y="290" class="text-main" fill="#7b1fa2">Tool Registry</text>
<rect x="660" y="255" width="100" height="30" class="box-tool" />
<text x="710" y="270" class="text-sub">Web Browsing</text>
<rect x="660" y="295" width="100" height="30" class="box-tool" />
<text x="710" y="310" class="text-sub">Vercel Sandbox</text>
<path d="M 620,290 L 660,270" class="line" marker-end="url(#arrow)" />
<path d="M 620,290 L 660,310" class="line" marker-end="url(#arrow)" />
<path d="M 370,60 L 210,100" class="line" marker-end="url(#arrow)" />
<text x="250" y="65" class="text-sm" transform="rotate(-20 250 65)">POST /api/council</text>
<path d="M 470,60 L 630,100" class="line" marker-end="url(#arrow)" />
<text x="590" y="65" class="text-sm" transform="rotate(20 590 65)">POST /api/agent</text>
<path d="M 210,230 L 370,290" class="line" marker-end="url(#arrow)" />
<path d="M 630,230 L 470,290" class="line" marker-end="url(#arrow)" />
